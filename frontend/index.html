<!doctype html>
<html lang="mk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Трпеза — Macedonian ingredient atlas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%23C0562F'/><rect x='35' y='35' width='30' height='30' fill='%23F4D58A' transform='rotate(45 50 50)'/></svg>">
  <link rel="stylesheet" href="/static/styles/base.css">
  <link rel="stylesheet" href="/static/styles/home.css">
  <link rel="stylesheet" href="/static/styles/ingredient.css">
  <link rel="stylesheet" href="/static/styles/recipes.css">
  <link rel="stylesheet" href="/static/styles/responsive.css">
</head>
<body>

  <!-- ===================== HEADER ===================== -->
  <header class="site-header">
    <div class="wrap header-inner">
      <button class="brand" id="brandHome">
        <span class="brand-mark"><span></span></span>
        <span>
          <span class="brand-name">Трпеза</span>
          <span class="brand-tag">ingredient atlas</span>
        </span>
      </button>

      <nav class="nav">
        <button class="nav-btn" data-nav="home" data-i18n="nav.home">Дома</button>
        <button class="nav-btn" data-nav="ingredient" data-i18n="nav.ingredient">Состојка</button>
        <button class="nav-btn" data-nav="recipes" data-i18n="nav.recipes">Рецепти</button>
        <span class="nav-divider"></span>
        <span class="lang-toggle" id="langToggle">
          <button data-lang="mk" class="active">MK</button>
          <button data-lang="en">EN</button>
        </span>
        <span class="model-badge" id="modelBadge"><span class="dot"></span><span id="modelName">…</span></span>
      </nav>
    </div>
  </header>

  <!-- ===================== VIEW MOUNT ===================== -->
  <div id="app"></div>

  <!-- scripts load in dependency order (classic scripts share one global scope) -->
  <script src="/static/scripts/helpers.js"></script>
  <script src="/static/scripts/state.js"></script>
  <script src="/static/scripts/i18n.js"></script>
  <script src="/static/scripts/api.js"></script>
  <script src="/static/scripts/views/home.js"></script>
  <script src="/static/scripts/views/ingredient.js"></script>
  <script src="/static/scripts/views/recipes.js"></script>
  <script src="/static/scripts/views/detail.js"></script>
  <script src="/static/scripts/router.js"></script>
  <script src="/static/scripts/app.js"></script>
