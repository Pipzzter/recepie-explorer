<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Трпеза — Macedonian ingredient atlas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%23C0562F'/><rect x='35' y='35' width='30' height='30' fill='%23F4D58A' transform='rotate(45 50 50)'/></svg>">
  <link rel="stylesheet" href="/static/styles/base.css">
  <link rel="stylesheet" href="/static/styles/home.css">
  <link rel="stylesheet" href="/static/styles/ingredient.css">
  <link rel="stylesheet" href="/static/styles/recipes.css">
  <link rel="stylesheet" href="/static/styles/docs.css">
  <link rel="stylesheet" href="/static/styles/responsive.css">
</head>
<body>

  <!-- ===================== HEADER ===================== -->
  <header class="site-header">
    <div class="wrap header-inner">
      <button class="brand" id="brandHome">
        <span class="brand-mark"><span></span></span>
        <span>
          <span class="brand-name">Трпеза</span>
        </span>
      </button>

      <nav class="nav">
        <button class="nav-btn" data-nav="home" data-i18n="nav.home">Home</button>
        <button class="nav-btn" data-nav="ingredient" data-i18n="nav.ingredient">Ingredient</button>
        <button class="nav-btn" data-nav="recipes" data-i18n="nav.recipes">Recipes</button>
        <button class="nav-btn" data-nav="docs" data-i18n="nav.docs">Docs</button>
        <span class="nav-divider"></span>
        <span class="lang-toggle" id="langToggle">
          <button data-lang="mk">MK</button>
          <button data-lang="en" class="active">EN</button>
        </span>
        <button class="model-badge" id="keyBtn" type="button" title="API key"><span class="dot"></span><span id="modelName">…</span></button>
      </nav>
    </div>
  </header>

  <!-- ===================== VIEW MOUNT ===================== -->
  <div id="app"></div>

  <!-- ===================== API KEY MODAL ===================== -->
  <div class="key-overlay hidden" id="keyOverlay">
    <div class="key-modal" role="dialog" aria-modal="true" aria-labelledby="keyTitle">
      <button class="key-close" id="keyClose" type="button" aria-label="Close">×</button>
      <div class="eyebrow" data-i18n="key.kicker">API key</div>
      <h3 id="keyTitle" data-i18n="key.title">Add your OpenAI API key</h3>
      <p class="key-help" data-i18n="key.help">Paste an OpenAI key to enable the full LLM pipeline. It is kept only in memory on the server — never logged or saved to disk.</p>
      <input id="keyInput" type="password" autocomplete="off" spellcheck="false" placeholder="sk-…">
      <div class="key-status" id="keyStatus"></div>
      <div class="key-actions">
        <button class="btn-soft" id="keyCancel" type="button" data-i18n="key.cancel">Cancel</button>
        <button class="btn-primary" id="keySave" type="button" data-i18n="key.save">Save key</button>
      </div>
    </div>
  </div>

  <!-- scripts load in dependency order (classic scripts share one global scope) -->
  <script src="/static/scripts/helpers.js"></script>
  <script src="/static/scripts/state.js"></script>
  <script src="/static/scripts/i18n.js"></script>
  <script src="/static/scripts/api.js"></script>
  <script src="/static/scripts/views/home.js"></script>
  <script src="/static/scripts/views/ingredient.js"></script>
  <script src="/static/scripts/views/recipes.js"></script>
  <script src="/static/scripts/views/detail.js"></script>
  <script src="/static/scripts/views/docs.js"></script>
  <script src="/static/scripts/router.js"></script>
  <script src="/static/scripts/app.js"></script>
</body>
</html>
